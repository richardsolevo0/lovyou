services:
  - type: web
    name: lovyou
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: lovyou-storage
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data/data
      - key: VIDEOS_DIR
        value: /var/data/videos
      - key: COOKIE_SECURE
        value: true
